name: 📈 Daily Stock Price Logger

on:
  schedule:
    - cron: '30 4 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 📊 Fetch stock prices
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: python Fetch_stocks.py

      - name: ✅ Commit and push changes
        run: |
          git config --global user.name "stock-bot"
          git config --global user.email "stock-bot@github.com"
          git add .
          git stash
          git pull --rebase
          git stash pop
          git diff --staged --quiet || git commit -m "📈 Stock update: $(date +'%Y-%m-%d')"
          git add .
          git commit -m "📈 Stock update: $(date +'%Y-%m-%d')" || true
          git push
